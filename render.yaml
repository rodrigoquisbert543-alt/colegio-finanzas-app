services:
  - type: web
    name: colegio-finanzas-app
    env: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    rootDir: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: "4000"
      - key: VITE_API_URL
        value: "/api"
        sync: false
